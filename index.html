<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooptenjo Mundialista 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#f8fafc] pb-24 md:pb-0 font-sans text-gray-900">

    <div id="loader" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-[#004d3d] text-white">
        <i data-lucide="refresh-cw" class="animate-spin mb-4 w-12 h-12"></i>
        <p class="font-black uppercase tracking-widest animate-pulse">Cargando Cooptenjo...</p>
    </div>

    <div id="login-screen" class="hidden min-h-screen bg-[#002b22] flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white/95 rounded-[3rem] shadow-2xl overflow-hidden z-10 border border-white/20">
            <div class="bg-gradient-to-br from-[#006e51] via-[#004d3d] to-[#002b22] p-12 text-center text-white">
                <i data-lucide="trophy" class="w-16 h-16 mx-auto mb-6 text-yellow-400"></i>
                <h1 class="text-3xl font-black uppercase">COOPTENJO</h1>
                <p class="text-yellow-400 text-xs font-black tracking-widest">Mundialista 2026</p>
            </div>
            <form id="login-form" class="p-10 space-y-6">
                <input type="email" id="email" class="w-full p-4 rounded-2xl bg-gray-50 border-2 outline-none font-bold" placeholder="usuario@cooptenjo.com" required>
                <input type="password" id="password" class="w-full p-4 rounded-2xl bg-gray-50 border-2 outline-none font-bold" placeholder="Pin" required>
                <button type="submit" class="w-full bg-[#006e51] text-white py-5 rounded-2xl font-black uppercase">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-[#004d3d] text-white sticky top-0 z-50 p-4 border-b-4 border-yellow-400">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i data-lucide="trophy" class="text-yellow-400 w-6 h-6"></i>
                    <span class="font-black text-lg uppercase">COOPTENJO</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-points" class="font-black text-yellow-400 text-xl">0 <small class="text-[10px]">PTS</small></span>
                    <button id="logout-btn" class="p-2 text-red-400"><i data-lucide="log-out"></i></button>
                </div>
            </div>
        </header>

        <main id="view-container" class="max-w-7xl mx-auto p-4 md:p-8">
            </main>

        <nav class="md:hidden fixed bottom-6 left-6 right-6 bg-white shadow-2xl rounded-[2.5rem] flex justify-around p-5 z-50">
            <button onclick="router.navigate('inicio')"><i data-lucide="home"></i></button>
            <button onclick="router.navigate('predicciones')"><i data-lucide="target"></i></button>
            <button onclick="router.navigate('ranking')"><i data-lucide="medal"></i></button>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
